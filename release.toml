# cargo-release config for the standalone uds_protocol repo (single crate).
publish = false
registry = "crates-io"
tag-name = "v{{version}}"
tag-message = "uds_protocol v{{version}}"
pre-release-commit-message = "chore(release): v{{version}}"
allow-branch = ["main"]
pre-release-hook = ["cargo", "test", "--locked"]
