name: Publish to crates.io

on:
  push:
    tags:
      - 'v[0-9]+.*'  # Only on version tags

jobs:
  publish:
    runs-on: ubuntu-latest
    # Restrict to the exact repo — blocks forks from running this
    if: github.repository == 'luminartech/uds_protocol'
    environment: crates-io  # Use a deployment environment for approval gates
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --token ${{ secrets.CARGO_CI_TOKEN }}