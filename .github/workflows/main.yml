name: UDS Protocol CI
on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      enable-comprehensive-tests:
        description: 'Run comprehensive test suites (longer fuzz, miri, benchmarks)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # =================================================================================================
  # CI Orchestration
  # =================================================================================================
  options:
    name: Resolve CI Options
    runs-on: ubuntu-latest
    outputs:
      comprehensive: ${{ steps.resolve.outputs.comprehensive }}
      is_release: ${{ steps.resolve.outputs.is_release }}
    steps:
      - name: Resolve event policy
        id: resolve
        shell: bash
        run: |
          comprehensive="false"
          is_release="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            comprehensive="${{ inputs.enable-comprehensive-tests }}"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            comprehensive="true"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ github.ref_type }}" == "tag" ]]; then
              comprehensive="true"
              is_release="true"
            elif [[ "${{ github.ref_name }}" == "main" ]]; then
              comprehensive="true"
            fi
          fi

          echo "comprehensive=$comprehensive" >> "$GITHUB_OUTPUT"
          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"

  # =================================================================================================
  # Pre-commit
  # =================================================================================================
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1

  # =================================================================================================
  # Linting and Formatting
  # =================================================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::pedantic

  # =================================================================================================
  # Build
  # =================================================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --all-features

  # =================================================================================================
  # Unit Tests
  # =================================================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: |
          cargo llvm-cov nextest --all-features --all-targets -E 'not test(prop_)' --lcov --output-path lcov.info
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 7

  # =================================================================================================
  # Property Tests
  # =================================================================================================
  property-tests:
    name: Property Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Run property tests
        run: cargo nextest run --all-features --lib -E 'test(prop_)' --test-threads=4

  # =================================================================================================
  # Fuzz Tests
  # =================================================================================================
  fuzz-tests:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    needs: [options]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Build fuzz targets
        run: cargo fuzz build
      - name: Run fuzz targets
        run: |
          MAX_TIME=${{ needs.options.outputs.comprehensive == 'true' && 60 || 6 }}
          cargo fuzz run fuzz_request_decode -- -max_total_time=${MAX_TIME}
          cargo fuzz run fuzz_response_decode -- -max_total_time=${MAX_TIME}
          cargo fuzz run fuzz_roundtrip -- -max_total_time=${MAX_TIME}
      - name: Upload fuzz artifacts on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          retention-days: 30

  # =================================================================================================
  # Miri Tests (Undefined Behaviour Detection)
  # =================================================================================================
  miri-tests:
    name: Miri Tests
    runs-on: ubuntu-latest
    needs: [options]
    if: needs.options.outputs.comprehensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri tests
        env:
          PROPTEST_DISABLE_FAILURE_PERSISTENCE: "1"
          MIRIFLAGS: "-Zmiri-env-forward=PROPTEST_DISABLE_FAILURE_PERSISTENCE"
        run: cargo +nightly miri test -p uds_protocol

  # =================================================================================================
  # MSRV Check
  # =================================================================================================
  msrv:
    name: Check MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: Build with MSRV
        run: cargo build --all-features

  # =================================================================================================
  # Semver Checks
  # =================================================================================================
  semver-checks:
    name: Semver Checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          baseline-rev: main

  # =================================================================================================
  # Security & Supply Chain
  # =================================================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install audit tools
        run: cargo install cargo-audit cargo-deny
      - name: Run cargo audit
        run: cargo audit --file Cargo.lock
      - name: Run cargo deny
        run: cargo deny check

  # =================================================================================================
  # Documentation
  # =================================================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  # =================================================================================================
  # Release
  # =================================================================================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, unit-tests, property-tests, fuzz-tests, security, semver-checks]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
